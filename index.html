<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>드빌3 젬 계산기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Dragon Village 3</p>
        <h1>개인용 젬 계산기</h1>
      </div>
      <div class="top-actions">
        <span id="syncStatus" class="badge">Firebase 연결 중</span>
        <button id="exportBtn" class="ghost">백업</button>
        <label class="ghost file-label">복원<input id="importInput" type="file" accept="application/json" /></label>
      </div>
    </header>

    <main class="grid">
      <section class="panel left-panel">
        <div class="panel-title">
          <h2>젬 창고</h2>
          <span id="gemCount" class="badge">0개</span>
        </div>

        <div class="card">
          <h3>젬 추가</h3>
          <div class="form-grid">
            <label>젬 능력<select id="setType"></select></label>
            <label>핵심 능력<select id="coreStat"></select></label>
            <label>세부 옵션 1<select id="sub1"></select></label>
            <label>세부 옵션 2<select id="sub2"></select></label>
            <label>세부 옵션 3<select id="sub3"></select></label>
          </div>
          <button id="addGemBtn" class="primary full">젬 추가</button>
        </div>

        <div class="section-head">
          <h3>보유 목록</h3>
        </div>
        <div id="inventoryList" class="inventory-list"></div>
      </section>

      <section class="panel center-panel">
        <div class="panel-title">
          <h2>젬 계산</h2>
          <span class="badge">최적 조합</span>
        </div>

        <div class="card sticky-card">
          <h3>1. 사용할 젬 능력 선택</h3>
          <p class="hint">4세트 포함: 2개 선택 / 2세트만 사용: 3개 선택</p>
          <div id="setPicker" class="chip-grid"></div>

          <h3>2. 콘텐츠 선택</h3>
          <select id="contentType" class="big-select"></select>

          <div class="calc-row">
            <button id="calculateBtn" class="primary">젬 계산</button>
            <button id="resetPickerBtn" class="ghost">선택 초기화</button>
          </div>
        </div>

        <div id="resultBox" class="result-box empty">
          <h3>계산 결과</h3>
          <p>젬 능력과 콘텐츠를 선택한 뒤 계산해줘.</p>
        </div>
      </section>

      <section class="panel right-panel">
        <div class="panel-title">
          <h2>사용 중</h2>
          <span id="activeCount" class="badge">0조합</span>
        </div>
        <div id="activeBuilds" class="active-builds"></div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
